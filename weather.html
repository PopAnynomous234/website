<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Weather — Mint Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syne:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --void: #0a0c0b;
            --base: #111412;
            --surface: rgba(23, 28, 25, 0.6);
            --accent: #26ff9a;
            --accent-glow: rgba(38, 255, 154, 0.3);
            --text-bright: #e6fff4;
            --text-muted: #688074;
            --glass-stroke: rgba(255, 255, 255, 0.08);
            --font-display: "Syne", sans-serif;
            --font-body: "Outfit", sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1a2e25, var(--void));
            background-attachment: fixed;
            color: var(--text-bright);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .mint-glow {
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-stroke);
            border-radius: 28px;
            padding: 1.75rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(38, 255, 154, 0.1);
        }

        .bento-grid {
            display: grid;
            max-width: 1200px;
            margin: 0 auto;
            gap: 1.5rem;
            grid-template-columns: repeat(4, 1fr);
        }

        /* Responsive adjustments */
        @media (max-width: 1024px) { .bento-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .bento-grid { grid-template-columns: 1fr; } }

        #wx-hourly-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            padding-bottom: 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .hourly-item {
            min-width: 110px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-stroke);
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
        }

        h1, h2, .display-font { font-family: var(--font-display); }
        
        .daily-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-stroke);
            padding: 1rem;
            border-radius: 20px;
            text-align: center;
            transition: 0.2s;
        }
        .daily-item:hover { background: rgba(38, 255, 154, 0.05); }
    </style>
</head>
<body>

    <div class="bento-grid">
        <div class="glass-card col-span-full lg:col-span-3 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="w-full">
                <p class="text-accent text-xs font-bold uppercase tracking-widest mb-2">Live Atmosphere</p>
                <h1 id="wx-cur-temp" class="text-8xl font-extrabold mint-glow leading-none">--</h1>
                <p id="wx-cur-desc" class="text-2xl font-light mt-2 opacity-90 italic">Syncing...</p>
                <div id="wx-outlook" class="mt-6 text-muted font-medium border-l-2 border-accent pl-4">--</div>
            </div>
            <div class="flex flex-col items-center md:items-end w-full md:w-auto">
                <i id="wx-cur-icon" class="fas fa-spinner fa-spin text-7xl mint-glow"></i>
                <div id="wx-aqi" class="mt-8 px-4 py-1.5 rounded-full border border-accent/30 bg-accent/5 text-accent text-xs font-bold">AQI: --</div>
            </div>
        </div>

        <div class="glass-card col-span-full lg:col-span-1 flex flex-col justify-around gap-4">
            <div class="flex items-center gap-4"><i class="fas fa-droplet text-accent w-5"></i> <span id="wx-pop">PoP: --</span></div>
            <div class="flex items-center gap-4"><i class="fas fa-wind text-accent w-5"></i> <span id="wx-wspd">Wind: --</span></div>
            <div class="flex items-center gap-4"><i class="fas fa-compass text-accent w-5"></i> <span id="wx-wdir">Direction: --</span></div>
            <div class="pt-4 border-t border-glass-stroke">
                <div id="wx-sunrise" class="text-xs text-muted mb-1 flex justify-between"><span>Sunrise:</span> <span class="text-white">--</span></div>
                <div id="wx-sunset" class="text-xs text-muted flex justify-between"><span>Sunset:</span> <span class="text-white">--</span></div>
            </div>
        </div>

        <div class="glass-card col-span-full lg:col-span-1">
            <h3 class="text-xs font-bold uppercase tracking-wider text-muted mb-6">Precipitation (24h)</h3>
            <div id="wx-pop-chart" class="h-32 w-full"></div>
        </div>

        <div class="glass-card col-span-full lg:col-span-3">
            <h3 class="text-xs font-bold uppercase tracking-wider text-muted mb-6">Chronological Forecast</h3>
            <div id="wx-hourly-scroll"></div>
        </div>

        <div class="glass-card col-span-full">
            <h3 class="text-xs font-bold uppercase tracking-wider text-muted mb-8 text-center">Extended 7-Day Cycle</h3>
            <div id="wx-daily-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4"></div>
        </div>

        <div class="glass-card col-span-full border-red-500/20">
            <h3 class="text-xs font-bold uppercase tracking-wider text-red-400 mb-4 flex items-center gap-2">
                <i class="fas fa-triangle-exclamation"></i> Critical Alerts
            </h3>
            <div id="wx-alerts-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        window.initWeatherPage = async function initWeatherPage() {
            const WMO_DESC = {0:'Clear Sky',1:'Mainly Clear',2:'Partly Cloudy',3:'Overcast',45:'Fog',48:'Icy Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',56:'Freezing Drizzle',57:'Heavy Freezing Drizzle',61:'Light Rain',63:'Rain',65:'Heavy Rain',66:'Freezing Rain',67:'Heavy Freezing Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',77:'Snow Grains',80:'Rain Showers',81:'Heavy Rain Showers',82:'Violent Rain Showers',85:'Snow Showers',86:'Heavy Snow Showers',95:'Thunderstorm',96:'Thunderstorm w/ Hail',99:'Thunderstorm w/ Heavy Hail'};
            
            const getIcon = (code, day=true) => {
                let icon = 'fa-sun';
                if (code===95||code===96||code===99) icon = 'fa-cloud-bolt';
                else if (code===75||code===77||code===86) icon = 'fa-snowflake';
                else if (code===71||code===73||code===85) icon = 'fa-snowflake';
                else if (code===56||code===57||code===66||code===67) icon = 'fa-icicles';
                else if (code===80||code===81||code===82) icon = 'fa-cloud-showers-heavy';
                else if (code>=51&&code<=65) icon = 'fa-cloud-rain';
                else if (code===45||code===48) icon = 'fa-smog';
                else if (code===3) icon = 'fa-cloud';
                else if (code===2) icon = day?'fa-cloud-sun':'fa-cloud-moon';
                else icon = day?'fa-sun':'fa-moon';
                return icon + ' mint-glow';
            };

            const degToDir = d => ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
            const fmtTime = iso => new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
            const unit = localStorage.getItem('delta_tempUnit') || 'F';
            const toDisp = t => unit==='F' ? Math.round(t)+'°F' : Math.round((t-32)*5/9)+'°C';

            // Geolocation Fallback
            let lat = window._weatherLat || 40.7128, lon = window._weatherLon || -74.0060; 

            try {
                const fRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,windspeed_10m,winddirection_10m,precipitation_probability&hourly=temperature_2m,weathercode,precipitation_probability,windspeed_10m&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,sunrise,sunset,windspeed_10m_max,winddirection_10m_dominant&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=7`);
                const f = await fRes.json();
                const cur = f.current;

                // Hero Update
                document.getElementById('wx-cur-icon').className = 'fas ' + getIcon(cur.weather_code);
                document.getElementById('wx-cur-temp').textContent = toDisp(cur.temperature_2m);
                document.getElementById('wx-cur-desc').textContent = WMO_DESC[cur.weather_code] || 'Unknown';
                document.getElementById('wx-pop').textContent = 'PoP: ' + (cur.precipitation_probability ?? f.hourly.precipitation_probability[0] ?? '--') + '%';
                document.getElementById('wx-wspd').textContent = 'Wind: ' + Math.round(cur.windspeed_10m) + ' mph';
                document.getElementById('wx-wdir').textContent = 'Dir: ' + degToDir(cur.winddirection_10m);
                document.getElementById('wx-sunrise').textContent = fmtTime(f.daily.sunrise[0]);
                document.getElementById('wx-sunset').textContent = fmtTime(f.daily.sunset[0]);
                document.getElementById('wx-outlook').textContent = `Today: Peak ${toDisp(f.daily.temperature_2m_max[0])} / Low ${toDisp(f.daily.temperature_2m_min[0])}`;

                // Chart Logic (Mint Styled)
                const chartDiv = document.getElementById('wx-pop-chart');
                const pops = f.hourly.precipitation_probability.slice(0, 24);
                const W = 300, H = 120, padB = 20, barW = W / 24;
                const bars = pops.map((p, i) => {
                    const bh = Math.max(2, ((p||0)/100) * (H - padB));
                    return `<rect x="${i * barW + 1}" y="${H - padB - bh}" width="${barW-2}" height="${bh}" fill="#26ff9a" fill-opacity="0.6" rx="2"/>`;
                }).join('');
                chartDiv.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" preserveAspectRatio="xMidYMax meet">${bars}</svg>`;

                // Hourly Scroll
                const hourlyEl = document.getElementById('wx-hourly-scroll');
                hourlyEl.innerHTML = f.hourly.time.slice(0, 48).map((t, i) => {
                    const d = new Date(t);
                    return `<div class="hourly-item">
                        <span class="text-[10px] uppercase font-bold text-muted">${d.toLocaleTimeString([],{hour:'numeric'})}</span>
                        <i class="fas ${getIcon(f.hourly.weathercode[i])} text-xl my-3 block"></i>
                        <span class="text-lg font-bold">${toDisp(f.hourly.temperature_2m[i])}</span>
                        <div class="text-[10px] text-accent mt-1"><i class="fas fa-droplet mr-1"></i>${f.hourly.precipitation_probability[i]}%</div>
                    </div>`;
                }).join('');

                // Daily Grid
                const dailyEl = document.getElementById('wx-daily-grid');
                const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
                dailyEl.innerHTML = f.daily.time.map((t, i) => {
                    const d = new Date(t + 'T12:00:00');
                    return `<div class="daily-item">
                        <span class="text-xs font-bold text-muted uppercase">${i===0 ? 'Today' : DAYS[d.getDay()]}</span>
                        <i class="fas ${getIcon(f.daily.weathercode[i])} text-2xl my-3 block"></i>
                        <div class="font-bold">${toDisp(f.daily.temperature_2m_max[i])}</div>
                        <div class="text-xs text-muted mb-2">${toDisp(f.daily.temperature_2m_min[i])}</div>
                        <div class="text-[10px] text-accent"><i class="fas fa-droplet mr-1"></i>${f.daily.precipitation_probability_max[i]}%</div>
                    </div>`;
                }).join('');

            } catch(e) { console.error('Error:', e); }

            // Air Quality
            try {
                const aqiRes = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`);
                const aqiData = await aqiRes.json();
                if (aqiData.current?.us_aqi != null) document.getElementById('wx-aqi').textContent = 'AQI: ' + aqiData.current.us_aqi;
            } catch {}

            // Alerts
            const alertsEl = document.getElementById('wx-alerts-list');
            try {
                const aRes = await fetch(`https://api.weather.gov/alerts/active?point=${lat},${lon}`);
                const aData = await aRes.json();
                const alerts = aData.features || [];
                alertsEl.innerHTML = alerts.length ? alerts.map(a => `<div class="p-3 rounded-xl border border-red-500/30 bg-red-500/5 text-sm">
                    <div class="font-bold text-red-400 mb-1">${a.properties.event}</div>
                    <div class="text-xs opacity-70">${a.properties.headline || ''}</div>
                </div>`).join('') : '<p class="text-accent/50 text-xs italic">Clear skies, no active atmospheric warnings.</p>';
            } catch { alertsEl.innerHTML = '<p class="text-muted text-xs">Alerts offline.</p>'; }
        };

        // Run on load
        window.addEventListener('DOMContentLoaded', () => {
            window.initWeatherPage();
        });
    </script>
    <script src="about.js"></script>
<script src="era4.js"></script>
<script src="era5.js"></script>
<script src="pe.js"></script>
<script src="warn.js"></script>
<script src="cursor.js"></script>
<script src="widget.js"></script>
</body>
</html>
