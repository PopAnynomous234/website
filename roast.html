<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAST AI | Cybernetic Burns</title>
    <style>
        /* --- 1. CORE THEME & VARIABLES --- */
        :root {
            --mint: #26ff9a;
            --mint-glow: rgba(38, 255, 154, 0.4);
            --bg-dark: #050505;
            --card-bg: rgba(18, 18, 22, 0.9);
            --border: rgba(38, 255, 154, 0.2);
            --text-p: #9ca3af;
            --shadow-glow: 0 0 20px rgba(38, 255, 154, 0.3), 0 0 40px rgba(38, 255, 154, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 50% 50%, #111 0%, #050505 100%),
                linear-gradient(rgba(38, 255, 154, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(38, 255, 154, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- 2. MAIN CONTAINER --- */
        #main-shell {
            width: 95%;
            max-width: 900px; /* Optimized chat width */
            height: 95vh;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), var(--shadow-glow);
            position: relative;
            z-index: 10;
        }

        /* Ambient Glow Border */
        #main-shell::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--mint), transparent, var(--mint));
            border-radius: 24px;
            z-index: -1;
            opacity: 0.15;
        }

        /* --- 3. HEADER --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--mint);
            text-shadow: 0 0 15px var(--mint-glow);
        }

        .api-badge {
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(38, 255, 154, 0.1);
            border: 1px solid var(--mint);
            color: var(--mint);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- 4. CHAT DISPLAY --- */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scroll-behavior: smooth;
        }

        /* Minimal Scrollbar */
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--mint); border-radius: 10px; }

        /* Message Structure */
        .message { display: flex; flex-direction: column; gap: 8px; max-width: 75%; animation: slideIn 0.3s ease-out; }
        .user { align-self: flex-end; text-align: right; }
        .ai { align-self: flex-start; }

        /* Message Bubbles */
        .bubble {
            padding: 15px 22px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
        }

        .user .bubble {
            background: var(--mint);
            color: #000;
            font-weight: 600;
            border-bottom-right-radius: 4px;
            box-shadow: 0 5px 15px rgba(38, 255, 154, 0.2);
        }

        .ai .bubble {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--mint);
            font-style: italic;
            text-shadow: 0 0 5px rgba(38, 255, 154, 0.3);
        }

        /* Metadata (Sent/Burned) */
        .meta-info {
            font-size: 0.7rem;
            color: var(--text-p);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* --- 5. ADVANCED LOADER (Burn Progress) --- */
        .roast-loading-card {
            border: 1px solid rgba(38, 255, 154, 0.1);
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
            display: none; /* Controlled by JS */
        }

        .burn-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .burn-fill {
            height: 100%;
            width: 0%;
            background: var(--mint);
            box-shadow: 0 0 10px var(--mint);
            transition: width 0.3s ease;
        }

        /* --- 6. INPUT AREA --- */
        .controls {
            padding: 30px 40px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .input-group {
            flex: 1;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            transition: box-shadow 0.3s ease;
        }

        .input-group:focus-within {
            box-shadow: 0 0 15px var(--mint-glow);
            border-color: var(--mint);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 18px 20px;
            font-size: 1.1rem;
            outline: none;
        }

        input::placeholder { color: #555; font-style: italic; }

        .gen-btn {
            background: var(--mint);
            color: #000;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gen-btn:hover {
            box-shadow: 0 0 20px var(--mint-glow);
            transform: translateY(-2px) scale(1.05);
        }

        .gen-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* --- 7. ANIMATIONS --- */
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        /* The typewriter/glitch effect applied to the AI roast */
        .ai-typed-roast {
            overflow: hidden;
            white-space: pre-wrap; /* Allows wrapping but keeps formatting */
            display: inline-block;
        }

    </style>
</head>
<body>

<div id="main-shell">
    <header>
        <div class="brand">ROAST <span style="font-weight: 300; color: #fff;">AI</span></div>
        <div class="api-badge">TRY TO ROAST ME!
        </div>
    </header>

    <div id="chat-window">
        <div class="message ai">
            <div class="bubble">bet you think you're funny. we'll see about that</div>
            <div class="meta-info">AI is challenging you!</div>
        </div>
    </div>

    <div id="burn-loader-card" class="message ai" style="display:none; align-self: center; text-align: center; width: 50%;">
        <div class="meta-info" style="color: var(--mint); text-shadow: 0 0 5px var(--mint);">Cooking...</div>
        <div class="burn-bar"><div id="burn-progress-fill" class="burn-fill"></div></div>
    </div>

    <div class="controls">
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Roast me" autocomplete="off">
            <button class="gen-btn" id="btn" onclick="executeRoast()">🔥</button>
        </div>
    </div>
</div>

<script>
    // --- IMPORTANT: Paste YOUR Google Apps Script URL here! ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw59ifB499jXvaV0Vfyd3eKYwpXWQ4iN_Z3uj2vZYauVa6uaTK7CRWlt111FKJ00LHG/exec";

    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('btn');
    const burnLoader = document.getElementById('burn-loader-card');
    const burnFill = document.getElementById('burn-progress-fill');

    // Handle 'Enter' key press
    input.addEventListener("keypress", (e) => { if(e.key === "Enter") executeRoast(); });

    async function executeRoast() {
        const val = input.value.trim();
        if (!val) return;
        
        // 1. Clear input and disable button
        input.value = "";
        btn.disabled = true;

        // 2. Add the user message (right side)
        addUserMessage(val);

        // 3. Show the 'Cooking...' loader
        showLoader();

        try {
            // 4. Send the request to your Google Apps Script
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                // Explicitly use text/plain to bypass CORS preflight check
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ text: val }),
                redirect: "follow" // CRITICAL for Google Script redirects
            });

            // Parse the response
            const data = await response.json();
            
            // 5. Hide loader and add the AI roast (left side) with typewriter effect
            hideLoader();
            addAiMessage(data.roast);

        } catch (err) {
            console.error("Fetch Error:", err);
            hideLoader();
            addAiMessage("The AI is too busy laughing at your internet connection to roast you right now.");
        } finally {
            // 6. Re-enable the button
            btn.disabled = false;
        }
    }

    // --- MESSAGE RENDERING ---

    function addUserMessage(text) {
        const msg = document.createElement('div');
        msg.className = 'message user';
        msg.innerHTML = `
            <div class="bubble">${text}</div>
            <div class="meta-info">Roasted AI</div>
        `;
        chat.appendChild(msg);
        scrollToBottom();
    }

    function addAiMessage(roastText) {
        const msg = document.createElement('div');
        msg.className = 'message ai';
        
        // Create the elements for the typewriter effect
        const bubble = document.createElement('div');
        bubble.className = 'bubble ai-typed-roast';
        
        const meta = document.createElement('div');
        meta.className = 'meta-info';
        meta.innerText = 'Get Fried';

        msg.appendChild(bubble);
        msg.appendChild(meta);
        chat.appendChild(msg);
        scrollToBottom();

        // Start the typewriter effect
        let charIndex = 0;
        const speed = 10; // ms per character (fast roast)
        
        function typeWriter() {
            if (charIndex < roastText.length) {
                bubble.innerText += roastText.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, speed);
            }
        }
        typeWriter();
    }

    // --- LOADER LOGIC ---

    function showLoader() {
        burnLoader.style.display = 'block';
        burnFill.style.width = "10%"; // Initial nudge
        
        // Fake a loading state
        setTimeout(() => burnFill.style.width = "60%", 500);
        setTimeout(() => burnFill.style.width = "90%", 1500);
        scrollToBottom();
    }

    function hideLoader() {
        burnFill.style.width = "100%"; // Finish it off
        setTimeout(() => {
            burnLoader.style.display = 'none';
            burnFill.style.width = "0%"; // Reset
        }, 300);
    }

    function scrollToBottom() { chat.scrollTop = chat.scrollHeight; }

</script>
    <script src="about.js"></script>
<script src="era4.js"></script>
<script src="era5.js"></script>
<script src="pe.js"></script>
<script src="warn.js"></script>
<script src="cursor.js"></script>
<script src="widget.js"></script>
</body>
</html>
