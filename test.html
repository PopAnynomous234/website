
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Club HTML Editor</title>
<link rel="icon" href="https://www.dropbox.com/scl/fi/vnz4rs2sjz6g4tal3j714/dhd-removebg-preview.png?rlkey=15d0v2yhflsimksh23ofvzzli&st=q5mgrxlo&raw=1" type="image/svg+xml">
  <!-- CodeMirror CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"> <!-- Added a dark theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/blackboard.min.css"> <!-- Added a high-contrast theme -->

  <!-- CodeMirror JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f9f9f9; color: #222; height: 100vh; display: flex; flex-direction: column; }
    .topbar { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; padding: 10px 20px; color: white; }
    .topbar a, .topbar button { color: white; text-decoration: none; padding: 6px 12px; border: none; background: #34495e; border-radius: 4px; cursor: pointer; margin-right: 5px; }
    .topbar a:hover, .topbar button:hover { background: #1abc9c; }

    .container { flex: 1; display: flex; border-top: 2px solid #ccc; min-height: 400px; max-height: calc(100vh - 60px); }
    .editor { flex: 1; display: flex; flex-direction: column; border-right: 3px solid #ccc; min-width: 200px; resize: horizontal; overflow: auto; position: relative; }
    .editor label { background: #eee; padding: 6px; font-weight: bold; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
    .CodeMirror { flex: 1; height: 100%; font-size: 14px; } /* Added initial font-size for CodeMirror */
    iframe { flex: 1; border: none; background: white; min-width: 200px; }

    .fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background:#5E06C9; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 1000; }
    .fab:hover { background: #8C4CE0; }

    .accessibility-menu { display: none; position: fixed; bottom: 85px; right: 20px; background: white; color: black; border: 1px solid #ccc; border-radius: 8px; padding: 12px; min-width: 220px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .accessibility-menu label { display: block; margin: 6px 0 3px; font-size: 14px; font-weight: bold; }
    .accessibility-menu select { width: 100%; padding: 4px; margin-bottom: 8px; }

    body.dark { background: #1e1e1e; color: #eee; }
    body.dark .topbar { background: #000; }
    body.dark a, body.dark button { background: #333; color: #eee; }
    body.high-contrast { background: black !important; color: yellow !important; }
    body.high-contrast a, body.high-contrast button { background: black !important; color: yellow !important; border: 2px solid yellow; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="left">
      <a href="dashboard.html">🏠 Dashboard</a>
      <a href="#">ℹ️ About</a>
    </div>
    <div class="right">
      <button id="fullscreenBtn">⛶ Fullscreen</button>
      <button id="logoutBtn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container" id="editorWrapper">
    <div class="editor">
      <label>
        HTML Editor
        <button id="downloadBtn">💾 Download</button>
      </label>
      <textarea id="htmlCode"></textarea>
    </div>
    <iframe id="preview"></iframe>
  </div>

  <div class="fab" id="accessibilityBtn">♿</div>

  <div class="accessibility-menu" id="accessibilityMenu">
    <label for="fontSize">Font Size</label>
    <select id="fontSize">
      <option value="12">Small</option>
      <option value="14" selected>Medium</option>
      <option value="18">Large</option>
      <option value="22">Extra Large</option>
    </select>

    <label for="lineSpacing">Line Spacing</label>
    <select id="lineSpacing">
      <option value="1">Normal</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>

    <label for="theme">Theme</label>
    <select id="theme">
      <option value="light" selected>Light</option>
      <option value="dark">Dark</option>
      <option value="high-contrast">High Contrast</option>
    </select>

    <label for="fontType">Font</label>
    <select id="fontType">
      <option value="default">Default</option>
      <option value="monospace">Monospace</option>
    </select>
  </div>

  <script>
    // ✅ CodeMirror setup
    const editor = CodeMirror.fromTextArea(document.getElementById("htmlCode"), {
      mode: "text/html", theme: "eclipse", lineNumbers: true, autoCloseTags: true
    });
    const preview = document.getElementById("preview");
    editor.on("change", () => preview.srcdoc = editor.getValue());

    // ✅ Accessibility
    const accessibilityBtn = document.getElementById("accessibilityBtn");
    const accessibilityMenu = document.getElementById("accessibilityMenu");
    accessibilityBtn.addEventListener("click", () => accessibilityMenu.style.display = accessibilityMenu.style.display === 'block' ? 'none' : 'block');

    document.getElementById("fontSize").addEventListener("change", e => {
      // Set font size for the CodeMirror editor directly
      const cmWrapper = document.querySelector('.CodeMirror');
      if (cmWrapper) {
        cmWrapper.style.fontSize = e.target.value + 'px';
      }
    });

    document.getElementById("lineSpacing").addEventListener("change", e => {
        const cmWrapper = document.querySelector('.CodeMirror');
        if (cmWrapper) {
            cmWrapper.style.lineHeight = e.target.value;
        }
    });

    document.getElementById("theme").addEventListener("change", e => {
      document.body.classList.remove('dark', 'high-contrast');
      if (e.target.value === 'dark') {
        document.body.classList.add('dark');
        editor.setOption('theme', 'dracula'); // Example dark theme for CodeMirror
      } else if (e.target.value === 'high-contrast') {
        document.body.classList.add('high-contrast');
        editor.setOption('theme', 'blackboard'); // Example high contrast theme
      } else {
        document.body.classList.remove('dark', 'high-contrast');
        editor.setOption('theme', 'eclipse'); // Default light theme
      }
    });

    document.getElementById("fontType").addEventListener("change", e => {
      // Set font family for the CodeMirror editor
      const cmWrapper = document.querySelector('.CodeMirror');
      if (cmWrapper) {
        cmWrapper.style.fontFamily = e.target.value === 'monospace' ? 'monospace' : 'Arial, sans-serif';
      }
      document.body.style.fontFamily = e.target.value === 'monospace' ? 'monospace' : 'Arial, sans-serif';
    });

    // ✅ Fullscreen
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    let isFullscreen = false;
    fullscreenBtn.addEventListener("click", () => {
      const wrapper = document.getElementById("editorWrapper");
      if (!isFullscreen) {
        wrapper.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });
    document.addEventListener("fullscreenchange", () => isFullscreen = !!document.fullscreenElement);

    // ✅ Download functionality
    const downloadBtn = document.getElementById("downloadBtn");
    downloadBtn.addEventListener("click", () => {
        const code = editor.getValue();
        const blob = new Blob([code], { type: "text/html" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "my-code.html";
        link.click();
    });

  </script>
</body>
</html>
