<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Syne:wght@800&display=swap" rel="stylesheet">

<style>

.apex-input:focus { outline: none; border-bottom-color: var(--mint); }

.btn-apex-main {
